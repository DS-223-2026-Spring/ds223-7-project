# Pulse — Docker Compose
# ──────────────────────────────────────────────────────
# Run from the repo root:
#   docker-compose up --build
#
# Services and ports:
#   db       → localhost:5433  (PostgreSQL)
#   pgadmin  → localhost:5050  (DB admin UI, login: admin@admin.com / admin)
#   back     → localhost:8008  (FastAPI — Swagger UI at /docs)
#   front    → localhost:8501  (Streamlit dashboard)
#   etl      → runs once, seeds the database, then exits
#   ds       → localhost:8888  (Data Science / Jupyter)
# ──────────────────────────────────────────────────────

services:

  db:
    image: postgres:16-alpine
    container_name: db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME}
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./pulse/etl/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL:    ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "5050:80"
    depends_on:
      db:
        condition: service_healthy

  back:
    build: ./pulse/api
    container_name: back
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
    ports:
      - "8008:8000"
    depends_on:
      db:
        condition: service_healthy

  front:
    build: ./pulse/app
    container_name: front
    restart: unless-stopped
    environment:
      API_URL: http://back:8000
    ports:
      - "8501:8501"
    depends_on:
      - back

  etl:
    build: ./pulse/etl
    container_name: etl
    restart: "no"
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      DB_HOST:      db
      DB_PORT:      5432
      DB_NAME:      ${DB_NAME}
      DB_USER:      ${DB_USER}
      DB_PASSWORD:  ${DB_PASSWORD}
    depends_on:
      db:
        condition: service_healthy

  ds:
    build: ./pulse/ds
    container_name: ds
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      DB_HOST:      db
      DB_PORT:      5432
      DB_NAME:      ${DB_NAME}
      DB_USER:      ${DB_USER}
      DB_PASSWORD:  ${DB_PASSWORD}
    ports:
      - "8888:8888"
    volumes:
      - ./pulse/ds:/app
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
